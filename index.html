<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba de Servidor Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f3ee;
      --paper: rgba(255, 255, 255, 0.72);
      --text: #1d1a17;
      --muted: #6f665e;
      --accent: #c96f3b;
      --accent-dark: #9f5429;
      --line: rgba(29, 26, 23, 0.1);
      --shadow: 0 20px 50px rgba(70, 42, 19, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(201, 111, 59, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(70, 42, 19, 0.08), transparent 30%),
        linear-gradient(180deg, #fbf8f4 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      background: rgba(201, 111, 59, 0.22);
      top: 8%;
      left: 6%;
    }

    .orb.two {
      width: 220px;
      height: 220px;
      background: rgba(29, 26, 23, 0.08);
      right: 8%;
      bottom: 10%;
      animation-delay: -3s;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 56px);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0 35%, rgba(255,255,255,0.4) 50%, transparent 65% 100%);
      transform: translateX(-100%);
      animation: sheen 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      opacity: 0;
      animation: reveal 0.8s ease forwards;
      animation-delay: 0.1s;
    }

    .eyebrow::before {
      content: "";
      width: 36px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(2.2rem, 7vw, 4.8rem);
      line-height: 0.95;
      margin: 0 0 18px;
      letter-spacing: -0.04em;
      max-width: 10ch;
      opacity: 0;
      animation: reveal 0.9s ease forwards;
      animation-delay: 0.22s;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 12px;
      max-width: 56ch;
      opacity: 0;
      animation: reveal 0.9s ease forwards;
    }

    p:nth-of-type(1) { animation-delay: 0.38s; }
    p:nth-of-type(2) { animation-delay: 0.52s; }

    .status {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.55);
      opacity: 0;
      animation: reveal 0.9s ease forwards;
      animation-delay: 0.66s;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .status:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 10px 24px rgba(70, 42, 19, 0.1);
      background: rgba(255, 255, 255, 0.8);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(201, 111, 59, 0.45);
      animation: pulse 1.8s infinite;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(201, 111, 59, 0.45);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(201, 111, 59, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(201, 111, 59, 0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
    }

    @keyframes sheen {
      0%, 85%, 100% { transform: translateX(-100%); }
      35% { transform: translateX(100%); }
    }

    @media (max-width: 640px) {
      .panel {
        border-radius: 20px;
      }

      .status {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main>
    <section class="panel">
      <div class="eyebrow">Prueba simple</div>
      <h1>Servidor web funcionando.</h1>
      <p>Si puedes ver esta página, significa que la configuración básica está respondiendo correctamente.</p>
      <p>Este es un contenido mínimo de prueba para verificar que todo está en línea.</p>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        <span>Estado: activo</span>
      </div>
    </section>
  </main>

  <script>
    // Script mínimo intencional para una página de prueba.
    console.log("Página de prueba cargada correctamente.");
  </script>
</body>
</html>
